# Development environment override
services:
  php:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: frankenphp_dev
      args:
        USER_UID: ${USER_UID:-10001}
        USER_GID: ${USER_GID:-10001}
    volumes:
      - ./:/app
      - ./infra/docker/frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./infra/docker/frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
    environment:
      FRANKENPHP_WORKER_CONFIG: watch
      # See https://xdebug.org/docs/all_settings#mode
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
    extra_hosts:
      - host.docker.internal:host-gateway
    tty: true

  database:
    ports:
      - target: 5432
        published: 5432
        protocol: tcp

  messenger:
    ports:
      - target: 5672
        published: 5672
        protocol: tcp
      - target: 15672
        published: 15672
        protocol: tcp

  mailpit:
    image: axllent/mailpit:v1.29
    ports:
      - "${HOST_PORT_MAILPIT:-8025}:8025"
      - "${SMTP_PORT_MAILPIT:-1025}:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
